<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newserchhip North VC</title>
    <meta name="description" content="Village Council Field Data App for property tax collection">
    <meta name="theme-color" content="#2c5282">
    <link rel="icon" type="image/png" href="./icons/icon-96.png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#f3f6fa;color:#16202e;line-height:1.6
        }
        .hero{
            background:linear-gradient(135deg,#2c5282,#1e3a5f);
            color:white;padding:50px 20px 40px;text-align:center
        }
        .hero h1{font-size:26px;font-weight:700;margin-bottom:6px}
        .hero p{font-size:14px;opacity:0.8}
        .hero .cta{
            display:inline-block;margin-top:16px;padding:12px 28px;
            background:white;color:#2c5282;border-radius:12px;
            font-weight:700;font-size:14px;text-decoration:none;
            box-shadow:0 4px 14px rgba(0,0,0,0.15);transition:transform 0.15s
        }
        .hero .cta:hover{transform:translateY(-2px)}
        .stats{max-width:420px;margin:0 auto;padding:40px 20px}
        .stats h2{font-size:22px;font-weight:700;text-align:center;color:#1e3a5f;margin-bottom:24px}
        .stat-row{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:white;border:1px solid #e2e7ee;border-radius:10px;margin-bottom:8px;box-shadow:0 1px 2px rgba(16,32,52,0.06)}
        .stat-row .label{font-size:14px;font-weight:600;color:#2c5282}
        .stat-row .value{font-size:20px;font-weight:700;color:#16202e}
        .stat-row.total{background:#2c5282;border-color:#2c5282}
        .stat-row.total .label{color:rgba(255,255,255,0.85)}
        .stat-row.total .value{color:white}
        .note{text-align:center;font-size:12px;color:#999;margin-top:30px;font-style:italic}
        .footer{text-align:center;padding:20px;font-size:12px;color:#999;border-top:1px solid #e2e7ee}
        .footer a{color:#2c5282;text-decoration:none;font-weight:600}
    </style>
</head>
<body>

<div class="hero">
    <h1>Newserchhip North VC</h1>
    <p>Village Council Field Data App</p>
    <a class="cta" href="./app/">Open the App</a>
</div>

<div class="stats">
    <h2>NEW SERCHHIP NORTH VILLAGE COUNCIL</h2>
    <p style="text-align:left;font-size:12px;color:#d97706;margin:-16px 0 20px;font-style:italic">⚠️ Disclaimer: Survey is going on, data may change at any time.</p>
    <div class="stat-row"><span class="label">POPULATION</span><span class="value" id="statPopulation">712</span></div>
    <div class="stat-row"><span class="label">MALE</span><span class="value" id="statMale">333</span></div>
    <div class="stat-row"><span class="label">FEMALE</span><span class="value" id="statFemale">379</span></div>
    <div class="stat-row"><span class="label">HOUSEHOLD</span><span class="value" id="statHousehold">171</span></div>
    <div class="stat-row total"><span class="label">TOTAL</span><span class="value" id="statTotal">1595</span></div>
    <div class="note" id="statFreshness"></div>
    <div class="note">Made with ❤️ by <a href="https://enga.in" target="_blank" style="color:#2c5282;text-decoration:none;font-weight:600">Enga</a></div>
</div>

<div class="footer">
    Source code on <a href="https://github.com/enga018/newserchhipnorthvc">GitHub</a>
</div>

<!-- Self-hosted, same as the app, so this loads reliably without depending on an
     external CDN. Only app+firestore are needed here — no auth, no login on this page. -->
<script src="./vendor/firebase-app-compat.js"></script>
<script src="./vendor/firebase-firestore-compat.js"></script>
<script>
// The numbers above are static fallbacks (last hand-entered snapshot) so the page
// still shows something reasonable if this fetch fails or the visitor is offline.
// Live numbers come from public/stats, a small aggregate-only document the admin
// dashboard keeps fresh — see firestore.rules for why only that one doc is public.
try {
    var firebaseConfig = {
        apiKey: "AIzaSyCkOVmm1cndO_O7M_82RCXmaJey4oYKyaE",
        authDomain: "newserchhipnorthvc.firebaseapp.com",
        projectId: "newserchhipnorthvc",
        storageBucket: "newserchhipnorthvc.firebasestorage.app",
        messagingSenderId: "547385765757",
        appId: "1:547385765757:web:df18cd27e9161b7d1c2614"
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.firestore();
    db.collection('public').doc('stats').get().then(function(doc) {
        if (!doc.exists) return;
        var s = doc.data();
        var set = function(id, v) { if (v != null) document.getElementById(id).textContent = v; };
        set('statPopulation', s.population);
        set('statMale', s.males);
        set('statFemale', s.females);
        set('statHousehold', s.households);
        set('statTotal', s.totalRecords);
        if (s.updatedAt) {
            var d = new Date(s.updatedAt);
            document.getElementById('statFreshness').textContent = 'Live as of ' + d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
        }
    }).catch(function(e) { console.warn('Could not load live stats, showing last-known numbers:', e.message); });
} catch (e) { console.warn('Live stats unavailable:', e.message); }
</script>

</body>
</html>
